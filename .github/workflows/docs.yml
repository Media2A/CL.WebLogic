name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: CL.WebLogic

      - name: Checkout CodeLogic
        uses: actions/checkout@v4
        with:
          repository: Media2A/CodeLogic
          path: CodeLogic

      - name: Checkout CodeLogic.Libs
        uses: actions/checkout@v4
        with:
          repository: Media2A/CodeLogic.Libs
          path: CodeLogic.Libs

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build project (generates XML docs)
        run: dotnet build CL.WebLogic/src/CL.WebLogic.csproj --configuration Release

      - name: Build documentation
        run: docfx CL.WebLogic/docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: CL.WebLogic/docs-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
