<div class="demo-panel h-100" data-widget-instance="{model:instance_id}" data-widget-name="{model:widget_name}">
    <div class="section-header">
        <div>
            <h2 class="section-title">{model:title}</h2>
            <p class="section-subtitle">This widget reads and writes its own persisted instance settings through WebLogic widget actions.</p>
        </div>
        <span class="badge rounded-pill badge-soft-green">Interactive widget</span>
    </div>
    <div class="mt-3">
        <p class="metric-label">Current count</p>
        <p class="metric-value">{model:count}</p>
        <p class="metric-note">Last saved: {model:updated_utc}</p>
    </div>
    <div class="d-flex gap-2 flex-wrap mt-3">
        <button class="btn btn-warning fw-semibold" type="button" data-widget-action="increment">Increment</button>
        <button class="btn btn-outline-light" type="button" data-widget-action="reset">Reset</button>
        <button class="btn btn-outline-light" type="button" data-widget-load-data>Refresh data</button>
    </div>
    <div class="code-shell mt-3">
<pre class="mb-0"><code>/api/weblogic/widgets/data
/api/weblogic/widgets/action</code></pre>
    </div>
</div>
